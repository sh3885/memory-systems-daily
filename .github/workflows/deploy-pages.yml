name: Deploy Astro Blog to Cloudflare Pages

on:
  push:
    branches:
      - main
      - content/daily
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "astro.config.*"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@latest pages deploy dist --project-name memory-systems-daily --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: fa1e2ac91105009ee4f956135781f7b0
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
